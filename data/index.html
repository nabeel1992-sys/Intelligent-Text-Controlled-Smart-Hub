<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI Smart Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        h2 {
            text-align: center;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 20px;
            color: #38bdf8;
            letter-spacing: 0.5px;
        }
        .data-box {
            background: rgba(15, 23, 42, 0.6);
            padding: 15px 20px;
            border-radius: 12px;
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 15px;
            border-left: 4px solid #38bdf8;
            letter-spacing: 0.5px;
        }
        .ota-box {
            background: rgba(15, 23, 42, 0.4);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }
        .ota-box h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #94a3b8;
        }
        .ota-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }
        input[type=file] {
            font-size: 12px;
            color: #94a3b8;
            max-width: 200px;
        }
        progress {
            width: 100%;
            height: 10px;
            margin-top: 10px;
            border-radius: 5px;
            display: none;
        }
        progress::-webkit-progress-bar {
            background-color: #334155;
            border-radius: 5px;
        }
        progress::-webkit-progress-value {
            background-color: #38bdf8;
            border-radius: 5px;
        }
        .chat-box {
            height: 300px;
            overflow-y: auto;
            padding: 15px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: thin;
            scrollbar-color: #38bdf8 transparent;
        }
        .chat-box::-webkit-scrollbar {
            width: 6px;
        }
        .chat-box::-webkit-scrollbar-thumb {
            background-color: #38bdf8;
            border-radius: 10px;
        }
        .chat-msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .ai-msg {
            background: #334155;
            color: #f8fafc;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .user-msg {
            background: #0284c7;
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        input[type=text] {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }
        input[type=text]:focus {
            box-shadow: 0 0 0 2px #38bdf8;
            border-color: transparent;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #38bdf8;
            color: #0f172a;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            background: #0ea5e9;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🤖 Aura AI Hub</h2>
    
    <!-- Live Sensor Data -->
    <div class="data-box" id="sensorData">⏳ Syncing environment data...</div>

    <!-- OTA Firmware Update Section -->
    <div class="ota-box">
        <h3>🔄 OTA Firmware Update</h3>
        <div class="ota-controls">
            <input type="file" id="otaFile" accept=".bin">
            <button onclick="startOTA()" style="padding: 8px 15px; font-size: 12px;">Upload</button>
        </div>
        <progress id="otaProgress" value="0" max="100"></progress>
        <div id="otaStatus" style="font-size: 12px; margin-top: 8px; color: #38bdf8;"></div>
    </div>

    <!-- AI Chatbot Interface -->
    <div class="chat-box" id="chatBox">
        <div class="chat-msg ai-msg"><strong>AI:</strong> System online. I am monitoring the room. How can I assist you today?</div>
    </div>
    
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask to turn on the fan..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    // --- API Key from sources ---
    const GEMINI_API_KEY = "AIzaSyAPMLYuEp_LWMLBaq6TkhMpun_f941F2sg"; 
    
    let currentTemp = "Unknown";
    let currentHum = "Unknown";

    // --- WebSocket Logic ---
    const ws = new WebSocket('ws://' + window.location.hostname + ':81/');
    
    ws.onmessage = function(event) {
        let msg = event.data;
        if(msg.includes("Temp:")) {
            document.getElementById('sensorData').innerText = msg;
            let tempMatch = msg.match(/Temp:\s*([\d.]+)°C/);
            let humMatch = msg.match(/Hum:\s*([\d.]+)%/);
            if(tempMatch) currentTemp = tempMatch[1] + "°C";
            if(humMatch) currentHum = humMatch[1] + "%";
        }
    };

    function appendMessage(sender, text, msgClass) {
        const chatBox = document.getElementById('chatBox');
        chatBox.innerHTML += `<div class="chat-msg ${msgClass}"><strong>${sender}:</strong> ${text}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // --- Google Gemini AI Logic ---
    async function sendMessage() {
        const inputField = document.getElementById('userInput');
        const userText = inputField.value;
        if(userText.trim() === "") return;

        appendMessage("You", userText, "user-msg");
        inputField.value = "";
        appendMessage("AI", "...", "ai-msg"); 

        const systemPrompt = `You are an advanced Smart Home AI Assistant. The room temperature is ${currentTemp} and humidity is ${currentHum}. 
        Give short, helpful answers. If the user asks to turn on the fan, cooling, or LED, and you agree based on the temperature, you MUST include the exact text "[CMD: FAN_ON]" at the very end of your response. If they ask to turn it off, include "[CMD: FAN_OFF]".`;

        const requestBody = {
            contents: [{ parts: [{ text: systemPrompt + "\nUser: " + userText }] }]
        };

        try {
            // Using the latest Gemini 3 model
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(requestBody)
            });

            const data = await response.json();
            
            if (data.error) {
                throw new Error(data.error.message);
            }

            // Using exact array indices  to read data correctly
            let aiResponse = data?.candidates?.[0]?.content?.parts?.[0]?.text || "No response from AI";
            
            const chatBox = document.getElementById('chatBox');
            chatBox.removeChild(chatBox.lastChild); 

            // --- HARDWARE TRIGGER ---
            if (aiResponse.includes("[CMD: FAN_ON]")) {
                ws.send("led_on"); 
                aiResponse = aiResponse.replace("[CMD: FAN_ON]", " 🟢 *Fan turned ON.*");
            } 
            else if (aiResponse.includes("[CMD: FAN_OFF]")) {
                ws.send("led_off"); 
                aiResponse = aiResponse.replace("[CMD: FAN_OFF]", " 🔴 *Fan turned OFF.*");
            }

            appendMessage("AI", aiResponse, "ai-msg");

        } catch (error) {
            console.error("AI Error:", error);
            const chatBox = document.getElementById('chatBox');
            chatBox.removeChild(chatBox.lastChild);
            appendMessage("AI", "❌ Connection failed: " + error.message, "ai-msg");
        }
    }

    // --- OTA Update Logic ---
    function startOTA() {
        const fileInput = document.getElementById('otaFile');
        const statusDiv = document.getElementById('otaStatus');
        const progressBar = document.getElementById('otaProgress');

        if (fileInput.files.length === 0) {
            statusDiv.innerText = "⚠️ Please select a .bin file first!";
            statusDiv.style.color = "#ef4444";
            return;
        }

        const file = fileInput.files;
        const formData = new FormData();
        formData.append("update", file, file.name);

        const xhr = new XMLHttpRequest();
        xhr.open("POST", "/update", true);

        progressBar.style.display = "block";
        statusDiv.style.color = "#38bdf8";

        xhr.upload.addEventListener("progress", function (e) {
            if (e.lengthComputable) {
                const percent = (e.loaded / e.total) * 100;
                progressBar.value = percent;
                statusDiv.innerText = "Uploading: " + percent.toFixed(0) + "%";
            }
        });

        xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    statusDiv.innerText = "✅ Update Successful! Rebooting...";
                    statusDiv.style.color = "#22c55e";
                    setTimeout(() => location.reload(), 5000);
                } else {
                    statusDiv.innerText = "❌ Update Failed! Check connection.";
                    statusDiv.style.color = "#ef4444";
                }
            }
        };

        xhr.send(formData);
    }
</script>
</body>
</html>

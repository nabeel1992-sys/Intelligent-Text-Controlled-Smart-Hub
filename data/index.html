<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI Smart Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { background: linear-gradient(135deg, #0f172a, #1e293b); color: #e2e8f0; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { width: 100%; max-width: 500px; background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); padding: 30px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        h2 { text-align: center; color: #38bdf8; margin-bottom: 20px; }
        .data-box { background: rgba(15, 23, 42, 0.6); padding: 15px; border-radius: 12px; text-align: center; font-size: 15px; font-weight: 600; margin-bottom: 15px; border-left: 4px solid #38bdf8; }
        .api-box { background: rgba(15, 23, 42, 0.4); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .api-box h3 { font-size: 14px; margin: 0 0 10px 0; color: #94a3b8; }
        .api-controls { display: flex; gap: 8px; }
        .chat-box { height: 250px; overflow-y: auto; padding: 15px; background: rgba(15, 23, 42, 0.4); border-radius: 12px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 12px; }
        .chat-msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; }
        .ai-msg { background: #334155; align-self: flex-start; }
        .user-msg { background: #0284c7; align-self: flex-end; }
        .input-area { display: flex; gap: 10px; }
        input[type=text], input[type=password] { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15, 23, 42, 0.8); color: #fff; outline: none; }
        button { padding: 10px 20px; border-radius: 10px; border: none; background: #38bdf8; color: #0f172a; font-weight: 600; cursor: pointer; }
        button:hover { background: #0ea5e9; }
        .ota-box { background: rgba(15, 23, 42, 0.4); padding: 15px; border-radius: 12px; margin-top: 15px; border: 1px solid rgba(255, 255, 255, 0.05); text-align: center; }
        .ota-box h3 { margin: 0 0 10px 0; font-size: 14px; color: #94a3b8; }
        progress { width: 100%; height: 8px; margin-top: 10px; border-radius: 5px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>🤖 Aura AI Hub</h2>
    
    <div class="api-box">
        <h3>🔑 Gemini API Key Setup</h3>
        <div class="api-controls">
            <input type="password" id="apiKeyInput" placeholder="Paste Gemini Key...">
            <button onclick="saveApiKey()">Save</button>
        </div>
        <div id="keyStatus" style="font-size: 11px; margin-top: 8px; color: #ef4444;">⚠️ Checking status...</div>
    </div>

    <div class="data-box" id="sensorData">🌡 Syncing sensors...</div>

    <div class="chat-box" id="chatBox">
        <div class="chat-msg ai-msg"><strong>AI:</strong> System online. Send a command.</div>
    </div>
    
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type command..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>

    <div class="ota-box">
        <h3>🔄 OTA Firmware Update</h3>
        <div style="display: flex; gap: 10px; justify-content: center; align-items: center;">
            <input type="file" id="otaFile" accept=".bin" style="font-size: 10px; color: #94a3b8;">
            <button onclick="startOTA()" style="padding: 8px 15px; font-size: 12px;">Upload</button>
        </div>
        <progress id="otaProgress" value="0" max="100"></progress>
        <div id="otaStatus" style="font-size: 12px; margin-top: 8px; color: #38bdf8;"></div>
    </div>
</div>

<script>
    let GEMINI_API_KEY = "";
    let currentTemp = "N/A", currentHum = "N/A";
    let ws;

    // Load API Key from ESP32 on Start
    window.onload = async function() {
        try {
            const res = await fetch('/get-api');
            GEMINI_API_KEY = await res.text();
            const status = document.getElementById('keyStatus');
            if(GEMINI_API_KEY && GEMINI_API_KEY.length > 20) {
                status.innerText = "✅ API Key loaded from ESP32 memory.";
                status.style.color = "#22c55e";
            } else {
                status.innerText = "⚠️ API Key missing! Save it above.";
            }
        } catch(e) { console.log("Memory fetch error"); }
        setupWebSocket();
    };

    function setupWebSocket() {
        ws = new WebSocket('ws://' + window.location.hostname + ':81/');
        ws.onmessage = (e) => {
            if(e.data.includes("Temp:")) {
                document.getElementById('sensorData').innerText = e.data;
                const t = e.data.match(/Temp:\s*([\d.]+)/);
                const h = e.data.match(/Hum:\s*([\d.]+)/);
                if(t) currentTemp = t[1] + "°C";
                if(h) currentHum = h[1] + "%";

                document.getElementById('sensorData').style.color = "#e2e8f0";
            }
        };
     // 👇 (Auto-Reconnect Logic) 👇
    ws.onclose = () => {
        console.log("Connection lost. ESP32 is rebooting...");
        let sensorDiv = document.getElementById('sensorData');
        sensorDiv.innerText = "⚠️ Firmware Updated! Reconnecting in 8s...";
        sensorDiv.style.color = "#ef4444"; // Red color for warning

        // 5 seconds baad browser khud page refresh kar lega
        setTimeout(() => {
            location.reload();
        }, 5000);
    };
}       


    function saveApiKey() {
        const key = document.getElementById('apiKeyInput').value.trim();
        if(!key) return;
        const formData = new FormData();
        formData.append("apikey", key);
        fetch('/save-api', { method: 'POST', body: formData })
        .then(() => {
            GEMINI_API_KEY = key;
            document.getElementById('keyStatus').innerText = "✅ Key saved to Flash!";
            document.getElementById('keyStatus').style.color = "#22c55e";
            document.getElementById('apiKeyInput').value = "";
        });
    }

    function appendMessage(sender, text, cls) {
        const b = document.getElementById('chatBox');
        const d = document.createElement('div');
        d.className = `chat-msg ${cls}`;
        d.innerHTML = `<strong>${sender}:</strong> ${text}`;
        b.appendChild(d);
        b.scrollTop = b.scrollHeight;
        return d;
    }

    async function sendMessage() {
        const i = document.getElementById('userInput');
        const txt = i.value.trim();
        if(!txt || !GEMINI_API_KEY) return;

        appendMessage("You", txt, "user-msg");
        i.value = "";
        const loader = appendMessage("AI", "Thinking...", "ai-msg");

        const prompt = `Context: Temp ${currentTemp}, Hum ${currentHum}. 
        Rules: Short reply. Use [CMD: FAN_ON] or [CMD: FAN_OFF] only for fan/led requests.
        User: ${txt}`;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            let aiTxt = data?.candidates?.[0]?.content?.parts?.[0]?.text || "No response";

            if (aiTxt.includes("[CMD: FAN_ON]")) { ws.send("led_on"); aiTxt = aiTxt.replace("[CMD: FAN_ON]", " 🟢"); }
            if (aiTxt.includes("[CMD: FAN_OFF]")) { ws.send("led_off"); aiTxt = aiTxt.replace("[CMD: FAN_OFF]", " 🔴"); }

            loader.innerHTML = `<strong>AI:</strong> ${aiTxt}`;
        } catch (e) { loader.innerHTML = `<strong>AI:</strong> ❌ Error`; }
    }

    // --- Merged OTA Update Logic ---
    function startOTA() {
        const fileInput = document.getElementById('otaFile');
        const statusDiv = document.getElementById('otaStatus');
        const progressBar = document.getElementById('otaProgress');

        if (fileInput.files.length === 0) {
            statusDiv.innerText = "⚠️ Please select a .bin file first!";
            statusDiv.style.color = "#ef4444";
            return;
        }

        const file = fileInput.files[0];
        const formData = new FormData();
        formData.append("update", file, file.name);

        const xhr = new XMLHttpRequest();
        xhr.open("POST", "/update", true);

        progressBar.style.display = "block";
        statusDiv.style.color = "#38bdf8";

        xhr.upload.addEventListener("progress", function (e) {
            if (e.lengthComputable) {
                const percent = (e.loaded / e.total) * 100;
                progressBar.value = percent;
                statusDiv.innerText = "Uploading: " + percent.toFixed(0) + "%";
            }
        });

        xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    statusDiv.innerText = "✅ Update Successful! Rebooting...";
                    statusDiv.style.color = "#22c55e";
                    setTimeout(() => location.reload(), 5000);
                } else {
                    statusDiv.innerText = "❌ Update Failed! Check connection.";
                    statusDiv.style.color = "#ef4444";
                }
            }
        };
        xhr.send(formData);
    }
</script>
</body>
</html>
